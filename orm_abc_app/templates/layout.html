<!doctype html>
<!--
    Документация по наследованию шаблонов:
        https://docs.djangoproject.com/en/5.2/ref/templates/language/#template-inheritance

-->
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5.3 CSS (CDN) -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >

    <!-- Собственные стили приложения -->
    {% load static %}
    <link href="{% static 'css/mycss.css' %}" rel="stylesheet">

    <title>{% block title %}orm_abc{% endblock %}</title>
</head>

<body>
<div class="container mt-3">

    <!-- Шапка: логотип + заголовок проекта -->
    <div class="card mb-2">
        <div class="card-body bgc d-flex align-items-center gap-2">
            {% load static %}
            <img
                src="{% static 'images/settings_django.png' %}"
                alt="Django логотип"
                height="30px"
            >
            <pre class="mb-0">object-relational mapper (ORM)</pre>
        </div>
    </div>

    <!-- Навигационное меню -->
    <div class="card mb-2">
        <div class="card-body">
            {% include "navigation.html" %}
        </div>
    </div>

    <!-- Основное содержимое страницы (заполняется дочерними шаблонами) -->
    <div class="card mb-2">
        <div class="card-body">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Футер -->
    <div class="card mb-2">
        <div class="card-body text-muted text-center">
            <small>orm_abc — учебный проект Django ORM</small>
        </div>
    </div>

</div>

<!-- Bootstrap 5.3 JS (CDN) -->
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmhCMQp4117MdSjCE8TYCOWkczfR"
    crossorigin="anonymous"
></script>
</body>
</html>
